[package]
name = "cheesecake_kernel"
version = "0.1.0"
edition = "2021"

[package.metadata.bootimage]
test-args = ["-serial", "stdio", "-display", "none"]

[dependencies]
# bootloader = { version = "0.9.23", features = ["map_physical_memory"] }
bootloader = "0.9.23"
x86_64 = "0.14"
uart_16550 = "0.2"
spin = "0.9"
volatile = "0.2"
linked_list_allocator = "0.10"


[[bin]]
name = "cheesecake_kernel"
path = "src/main.rs"

[profile.dev]
panic = "abort"
opt-level = 1          # 0 can cause stack issues in no_std

[profile.release]
panic = "abort"
opt-level = 3
lto = true
